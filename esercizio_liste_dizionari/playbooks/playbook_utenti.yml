---
- name: Creazione utenti da lista di dizionari.
  hosts: rocky9
  become: true
  vars:
    utenti:
      - username: pippo
        group: users
        home: /home/pippo
        shell: /bin/bash
      - username: pluto
        group: users
        home: /home/pluto
        shell: /bin/bash
  tasks:
    - name: Creazione utente
      ansible.builtin.user:
        name: "{{ item.username }}"
        group: "{{ item.group }}"
        home: "{{ item.home }}"
        shell: "{{ item.shell }}"
        state: present
      loop: "{{ utenti }}"
